server.port=${PORT:4000}

spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:food_waste_platform}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt-secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret-in-production}
app.cors-origin=${CORS_ORIGIN:http://localhost:5173}
app.data-file=${DATA_FILE:data/data.json}
app.jwt-expiration-days=${JWT_EXPIRATION_DAYS:7}
app.otp-expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.dev-otp-mode=${DEV_OTP_MODE:false}
